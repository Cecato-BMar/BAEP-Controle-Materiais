{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} — Frota BAEP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-0 fw-bold"><i class="fas fa-wrench me-2 text-danger"></i>{{ titulo }}</h4>
        <small class="text-muted">Gestão de Frota BAEP</small>
    </div>
    <a href="{% url 'viaturas:lista_manutencoes' %}" class="btn btn-outline-secondary btn-sm"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
</div>
<div class="card border-0">
    <div class="card-body">
        <form method="post">{% csrf_token %}{% crispy form %}
            <div class="d-flex justify-content-end gap-2 mt-3 pt-3 border-top">
                <a href="{% url 'viaturas:lista_manutencoes' %}" class="btn btn-outline-secondary">Cancelar</a>
                <button type="submit" class="btn btn-danger fw-bold px-4"><i class="fas fa-save me-1"></i>Salvar Manutenção</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
