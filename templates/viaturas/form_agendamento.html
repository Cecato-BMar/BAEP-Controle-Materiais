{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Agendar Manutenção — Frota BAEP{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-0 fw-bold"><i class="fas fa-calendar-plus me-2 text-primary"></i>{{ titulo }}</h4>
        <small class="text-muted">Registre um agendamento futuro de manutenção para uma viatura</small>
    </div>
    <a href="{% url 'viaturas:lista_agendamentos' %}" class="btn btn-outline-secondary btn-sm">
        <i class="fas fa-arrow-left me-1"></i>Voltar
    </a>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {% crispy form %}
            <hr class="my-4">
            <div class="d-flex gap-2 justify-content-end">
                <a href="{% url 'viaturas:lista_agendamentos' %}" class="btn btn-outline-secondary">
                    <i class="fas fa-times me-1"></i>Cancelar
                </a>
                <button type="submit" class="btn btn-primary fw-bold">
                    <i class="fas fa-calendar-check me-1"></i>Salvar Agendamento
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
