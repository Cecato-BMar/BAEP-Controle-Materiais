{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} — Peça Viatura{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white border-0 py-3">
                <h4 class="mb-0 text-primary fw-bold"><i class="fas fa-cog me-2"></i>{{ titulo }}</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% crispy form %}
                    
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'viaturas:lista_pecas' %}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary fw-bold"><i class="fas fa-save me-1"></i>Salvar Peça</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
