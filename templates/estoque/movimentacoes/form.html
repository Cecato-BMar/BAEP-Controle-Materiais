{% extends 'estoque/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }}{% endblock %}

{% block estoque_content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3 mb-0">
        <i class="fas fa-exchange-alt text-success"></i>
        {{ title }}
    </h1>
    <div>
        <a href="{% url 'estoque:lista_movimentacoes' %}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Voltar
        </a>
    </div>
</div>

<div class="card shadow">
    <div class="card-header">
        <h6 class="m-0">
            <i class="fas fa-edit"></i>
            Dados da Movimentação
        </h6>
    </div>
    <div class="card-body">
        {% crispy form %}
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    const qrInput = document.getElementById('id_qr_code');
    const produtoSelect = document.getElementById('id_produto');

    if (!qrInput || !produtoSelect) return;

    async function buscarProdutoPorQr(token) {
        const url = `{% url 'estoque:buscar_produto_por_qr_ajax' %}?token=${encodeURIComponent(token)}`;
        const resp = await fetch(url, { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
        const data = await resp.json();

        if (!resp.ok || !data.found) {
            return { ok: false, error: data.error || 'Não foi possível localizar o produto.' };
        }

        return { ok: true, produto: data };
    }

    qrInput.addEventListener('change', async function() {
        const token = (qrInput.value || '').trim();
        if (!token) return;

        qrInput.classList.remove('is-invalid');

        try {
            const result = await buscarProdutoPorQr(token);
            if (!result.ok) {
                qrInput.classList.add('is-invalid');
                return;
            }

            const produtoId = String(result.produto.id);
            let option = produtoSelect.querySelector(`option[value="${produtoId}"]`);
            if (!option) {
                option = document.createElement('option');
                option.value = produtoId;
                option.textContent = `${result.produto.codigo} - ${result.produto.nome}`;
                produtoSelect.appendChild(option);
            }

            produtoSelect.value = produtoId;
            produtoSelect.dispatchEvent(new Event('change'));
        } catch (e) {
            qrInput.classList.add('is-invalid');
        }
    });
})();
</script>
{% endblock %}
