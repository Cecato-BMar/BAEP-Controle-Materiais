{% extends 'estoque/lista_generica.html' %}
{% block table_rows %}
{% for o in page_obj|default:objetos %}
<tr>
    <td><code>{{ o.documento }}</code></td>
    <td class="fw-bold">{{ o.nome }}</td>
    <td>{{ o.get_tipo_pessoa_display }}</td>
    <td class="text-center">
        {% if o.ativo %}
            <span class="badge bg-success">Ativo</span>
        {% else %}
            <span class="badge bg-danger">Inativo</span>
        {% endif %}
    </td>
    <td class="text-end">
        <a href="{% url 'estoque:detalhe_fornecedor' o.id %}" class="btn btn-xs btn-outline-secondary btn-sm"><i class="fas fa-eye"></i></a>
    </td>
</tr>
{% endfor %}
{% endblock %}
