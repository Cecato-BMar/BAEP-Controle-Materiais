{% extends 'estoque/lista_generica.html' %}
{% block table_rows %}
{% for o in page_obj %}
<tr>
    <td><code>{{ o.codigo }}</code></td>
    <td class="fw-bold">{{ o.nome }}</td>
    <td>{{ o.categoria.nome }}</td>
    <td class="text-end">
        <a href="{% url 'estoque:editar_subcategoria' o.id %}" class="btn btn-xs btn-outline-secondary btn-sm rounded-circle"><i class="fas fa-pencil-alt text-primary"></i></a>
    </td>
</tr>
{% empty %}
<tr>
    <td colspan="4" class="text-center text-muted py-5 animate__animated animate__pulse animate__infinite">
        <i class="fas fa-search me-2"></i>Nenhuma subcategoria localizada.
    </td>
</tr>
{% endfor %}
{% endblock %}
