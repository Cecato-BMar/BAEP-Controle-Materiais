{% extends 'estoque/lista_generica.html' %}
{% block table_rows %}
{% for o in page_obj %}
<tr>
    {% if o.sigla %}<td><code>{{ o.sigla }}</code></td>{% endif %}
    <td class="fw-bold">{{ o.nome }}</td>
    <td class="small">{{ o.descricao|default:"-" }}</td>
    <td class="text-center">
        {% if o.ativo %}
            <span class="badge bg-success">Ativo</span>
        {% else %}
            <span class="badge bg-danger">Inativo</span>
        {% endif %}
    </td>
    <td class="text-end">
        {% if o.sigla %}
            <a href="{% url 'estoque:editar_unidade_medida' o.id %}" class="btn btn-xs btn-outline-secondary btn-sm"><i class="fas fa-pencil-alt text-primary"></i></a>
        {% else %}
            <a href="{% url 'estoque:editar_unidade_fornecimento' o.id %}" class="btn btn-xs btn-outline-secondary btn-sm"><i class="fas fa-pencil-alt text-primary"></i></a>
        {% endif %}
    </td>
</tr>
{% endfor %}
{% endblock %}
