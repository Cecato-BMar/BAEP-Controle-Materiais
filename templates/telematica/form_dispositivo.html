{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} | Telemática{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="fw-bold mb-0" style="font-size:1.5rem;"><i class="fas fa-satellite-dish text-info me-2"></i>{{ titulo }}</h1>
  <a href="{% url 'telematica:lista_dispositivos' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
</div>
<div class="row justify-content-center">
  <div class="col-lg-9">
    <div class="card">
      <div class="card-header"><i class="fas fa-satellite-dish me-2"></i>Dados do Dispositivo GPS</div>
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% crispy form %}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
