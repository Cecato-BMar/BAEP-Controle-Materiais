{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} | Telemática{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="fw-bold mb-0" style="font-size: 1.6rem;"><i class="fas fa-plus-circle text-primary me-2"></i>{{ titulo }}</h1>
        <p class="text-muted mb-0">Insira as informações técnicas e de rede do equipamento.</p>
    </div>
    <a href="{% url 'telematica:lista_equipamentos' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar ao Inventário</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post" class="needs-validation">
                    {% csrf_token %}
                    {% crispy form %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
