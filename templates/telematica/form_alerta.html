{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Registrar Alerta | Telemática{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h1 class="fw-bold mb-0" style="font-size:1.5rem;"><i class="fas fa-bell text-danger me-2"></i>Registrar Alerta Manual</h1>
  <a href="{% url 'telematica:lista_alertas' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
</div>
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="card">
      <div class="card-body">
        <form method="post">{% csrf_token %}{% crispy form %}</form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
