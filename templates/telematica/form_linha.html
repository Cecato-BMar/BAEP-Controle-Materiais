{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} | Telemática{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0" style="font-size: 1.6rem;"><i class="fas fa-id-card text-info me-2"></i>{{ titulo }}</h1>
                <p class="text-muted mb-0">Preencha os dados da linha móvel ou chip.</p>
            </div>
            <a href="{% url 'telematica:lista_linhas' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                {% crispy form %}
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
$(document).ready(function() {
    $('.select2-policial').select2({
        theme: 'bootstrap-5',
        placeholder: 'Busque por RE ou Nome no Efetivo...',
        allowClear: true,
        ajax: {
            url: "{% url 'estoque:buscar_militares_ajax' %}",
            dataType: 'json',
            delay: 300,
            data: function (params) {
                return { q: params.term };
            },
            processResults: function (data) {
                return { results: data.results };
            },
            cache: true
        },
        minimumInputLength: 2,
        language: {
            inputTooShort: function() { return "Digite pelo menos 2 caracteres..."; },
            noResults: function() { return "Nenhum policial encontrado."; },
            searching: function() { return "Buscando..."; }
        }
    });
});
</script>
{% endblock %}
