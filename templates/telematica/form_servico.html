{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ titulo }} | Telemática{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="fw-bold mb-0" style="font-size: 1.6rem;"><i class="fas fa-network-wired text-success me-2"></i>{{ titulo }}</h1>
                <p class="text-muted mb-0">Gerencie detalhes de infraestrutura, links e contratos de TI.</p>
            </div>
            <a href="{% url 'telematica:lista_servicos' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                {% crispy form %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
