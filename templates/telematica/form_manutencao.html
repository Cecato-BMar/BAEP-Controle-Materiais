{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Registrar Manutenção | Telemática{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h1 class="fw-bold mb-0" style="font-size: 1.6rem;"><i class="fas fa-tools text-warning me-2"></i>Registrar Manutenção / Suporte</h1>
        <p class="text-muted mb-0">Documente o problema e a solução técnica aplicada.</p>
    </div>
    <a href="{% url 'telematica:lista_manutencoes' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Voltar</a>
</div>

<div class="row justify-content-center">
    <div class="col-lg-10">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% crispy form %}
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
